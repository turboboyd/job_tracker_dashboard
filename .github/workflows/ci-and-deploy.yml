name: CI + Deploy (gh-pages)

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run typecheck
        run: npm run typecheck --if-present

      - name: Run tests
        run: npm test --if-present

  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d job_tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: python -m alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/job_tracker

      - name: Run tests
        working-directory: backend
        run: python -m pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/job_tracker
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/job_tracker
          # FIREBASE_CREDENTIALS_JSON_PATH intentionally omitted — tests mock Firebase auth

  deploy:
    needs: lint
    runs-on: ubuntu-latest


    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    env:
      PUBLIC_URL: /job_tracker_dashboard
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@4.1.0
        with:
          branch: gh-pages
          folder: dist
          token: ${{ secrets.GITHUB_TOKEN }}